<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards — Composition et qualité de l'air</title>
  <style>
    :root {
      --bleu: #1a56db;
      --bleu-cl: #e8f0fe;
      --vert: #0f9d58;
      --vert-cl: #e6f4ea;
      --rouge: #d93025;
      --rouge-cl: #fce8e6;
      --orange: #f29900;
      --orange-cl: #fff3e0;
      --gris: #f8f9fa;
      --ombre: 0 2px 12px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--gris);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--bleu);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--ombre);
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header .badge {
      background: rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: .8rem;
    }
    .back-link {
      margin-left: auto;
      color: white;
      text-decoration: none;
      font-size: .85rem;
      opacity: .85;
    }
    .back-link:hover { opacity: 1; }

    /* COMPTEUR */
    .compteur {
      text-align: center;
      padding: 20px 16px 8px;
      color: #555;
      font-size: .9rem;
    }
    .progress-bar {
      height: 4px;
      background: #e0e0e0;
      border-radius: 4px;
      margin: 8px 24px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--bleu);
      border-radius: 4px;
      transition: width .4s ease;
    }

    /* ZONE CARTE */
    .carte-zone {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
      perspective: 1000px;
    }

    .carte-wrapper {
      width: 100%;
      max-width: 520px;
      height: 280px;
      cursor: pointer;
    }
    .carte-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
    }
    .carte-wrapper.retournee .carte-inner {
      transform: rotateY(180deg);
    }

    .carte-face {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 28px;
      text-align: center;
    }
    .recto {
      background: white;
      border-top: 5px solid var(--bleu);
    }
    .verso {
      background: white;
      border-top: 5px solid var(--vert);
      transform: rotateY(180deg);
    }

    .recto .label {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--bleu);
      margin-bottom: 16px;
    }
    .recto .question {
      font-size: 1.1rem;
      color: #222;
      line-height: 1.5;
    }
    .recto .indice {
      margin-top: 16px;
      font-size: .78rem;
      color: #aaa;
    }

    .verso .label {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--vert);
      margin-bottom: 12px;
    }
    .verso .reponse {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--vert);
      margin-bottom: 10px;
    }
    .verso .explication {
      font-size: .88rem;
      color: #555;
      line-height: 1.5;
    }

    /* BOUTONS */
    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 0 16px 24px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .1s, opacity .2s;
    }
    .btn:active { transform: scale(.97); }
    .btn-prev {
      background: var(--gris);
      color: #444;
      border: 1px solid #ddd;
    }
    .btn-flip {
      background: var(--bleu);
      color: white;
    }
    .btn-next {
      background: var(--bleu);
      color: white;
    }
    .btn:disabled { opacity: .4; cursor: default; }

    /* SHUFFLE */
    .shuffle-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 0 16px 8px;
    }
    .btn-shuffle {
      background: var(--orange-cl);
      color: var(--orange);
      border: 1px solid var(--orange);
      border-radius: 8px;
      padding: 7px 16px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-shuffle:hover { background: var(--orange); color: white; }

    /* SCORE */
    .score-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 0 16px 16px;
    }
    .badge-su { background: var(--vert-cl); color: var(--vert); border-radius: 8px; padding: 6px 14px; font-size: .85rem; font-weight: 700; }
    .badge-re { background: var(--rouge-cl); color: var(--rouge); border-radius: 8px; padding: 6px 14px; font-size: .85rem; font-weight: 700; }

    /* AUTO-ÉVAL */
    .eval-zone {
      display: none;
      justify-content: center;
      gap: 12px;
      padding: 0 16px 8px;
      animation: fadeIn .3s;
    }
    .eval-zone.visible { display: flex; }
    .btn-su { background: var(--vert-cl); color: var(--vert); border: 1px solid var(--vert); border-radius: 10px; padding: 10px 20px; font-size: .9rem; font-weight: 700; cursor: pointer; }
    .btn-re { background: var(--rouge-cl); color: var(--rouge); border: 1px solid var(--rouge); border-radius: 10px; padding: 10px 20px; font-size: .9rem; font-weight: 700; cursor: pointer; }
    .btn-su:hover { background: var(--vert); color: white; }
    .btn-re:hover { background: var(--rouge); color: white; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* RÉSULTAT FINAL */
    .zone-fin {
      display: none;
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px;
      text-align: center;
    }
    .zone-fin.visible { display: block; }
    .zone-fin .card {
      background: white;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: var(--ombre);
    }
    .zone-fin h2 { font-size: 1.4rem; margin-bottom: 8px; }
    .zone-fin .big-score { font-size: 3rem; font-weight: 800; color: var(--bleu); margin: 12px 0; }
    .zone-fin p { color: #555; margin-bottom: 20px; }
    .btn-restart { background: var(--bleu); color: white; border: none; border-radius: 10px; padding: 12px 28px; font-size: 1rem; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <span>🃏</span>
  <div>
    <h1 id="fc-titre">Flashcards</h1>
    <small id="fc-classe"></small>
  </div>
  <span class="badge">4ème</span>
  <a href="index.html" class="back-link">← Accueil</a>
</header>

<!-- PROGRESSION -->
<div class="compteur" id="compteur">Chargement…</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

<!-- SHUFFLE & SCORE -->
<div class="shuffle-bar" style="margin-top:12px">
  <button class="btn-shuffle" onclick="FC.melanger()">🔀 Mélanger</button>
</div>
<div class="score-bar">
  <span class="badge-su">✅ Sus : <span id="nb-su">0</span></span>
  <span class="badge-re">❌ À revoir : <span id="nb-re">0</span></span>
</div>

<!-- CARTE -->
<div class="carte-zone" id="carte-zone">
  <div class="carte-wrapper" id="carte" onclick="FC.retourner()">
    <div class="carte-inner" id="carte-inner">
      <div class="carte-face recto">
        <div class="label">❓ Question</div>
        <div class="question" id="recto-question">Chargement…</div>
        <div class="indice">Clique pour voir la réponse</div>
      </div>
      <div class="carte-face verso">
        <div class="label">✅ Réponse</div>
        <div class="reponse" id="verso-reponse"></div>
        <div class="explication" id="verso-explication"></div>
      </div>
    </div>
  </div>
</div>

<!-- AUTO-ÉVAL (après retournement) -->
<div class="eval-zone" id="eval-zone">
  <button class="btn-re" onclick="FC.evaluer(false)">❌ À revoir</button>
  <button class="btn-su" onclick="FC.evaluer(true)">✅ Je savais</button>
</div>

<!-- NAVIGATION -->
<div class="controls">
  <button class="btn btn-prev" id="btn-prev" onclick="FC.precedente()">◀ Précédente</button>
  <button class="btn btn-next" id="btn-next" onclick="FC.suivante()">Suivante ▶</button>
</div>

<!-- FIN -->
<div class="zone-fin" id="zone-fin">
  <div class="card">
    <h2>Séance terminée ! 🎉</h2>
    <div class="big-score" id="fin-score"></div>
    <p id="fin-msg"></p>
    <button class="btn-restart" onclick="FC.recommencer()">🔄 Recommencer</button>
    <br><br>
    <button class="btn-restart" style="background:#555" onclick="FC.reviserRatees()">📌 Revoir les ratées</button>
  </div>
</div>

<script>
const FC = {
  questions: [],
  toutes: [],
  index: 0,
  retournee: false,
  scores: { su: 0, re: 0 },
  resultats: [],

  async init() {
    try {
      const params = new URLSearchParams(window.location.search);
      const fichier = params.get('qcm') || 'qcm-4e-ch01.json';
      const resp = await fetch('data/' + fichier);
      if (!resp.ok) throw new Error('Fichier introuvable');
      const data = await resp.json();
      document.getElementById('fc-titre').textContent = 'Flashcards — ' + data.chapitre;
      document.getElementById('fc-classe').textContent = data.classe;
      this.toutes = data.questions;
      this.questions = [...this.toutes];
      this.afficher();
    } catch(e) {
      document.getElementById('compteur').textContent = '⚠️ Erreur : ' + e.message;
    }
  },

  shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  },

  afficher() {
    const q = this.questions[this.index];
    const total = this.questions.length;
    const num = this.index + 1;

    // Recto
    document.getElementById('recto-question').textContent = q.enonce;

    // Verso
    const bonneReponse = q.options[q.reponse];
    document.getElementById('verso-reponse').textContent = bonneReponse;
    // Nettoyer le feedback (enlever ✅ ❌ du début)
    const expl = (q.feedback_correct || '').replace(/^[✅❌]\s*/, '');
    document.getElementById('verso-explication').textContent = expl;

    // Compteur
    document.getElementById('compteur').textContent = 'Carte ' + num + ' / ' + total;

    // Barre
    document.getElementById('progress-fill').style.width = ((num - 1) / total * 100) + '%';

    // Reset flip
    this.retournee = false;
    const carte = document.getElementById('carte');
    carte.classList.remove('retournee');
    document.getElementById('eval-zone').classList.remove('visible');

    // Boutons nav
    document.getElementById('btn-prev').disabled = this.index === 0;
    document.getElementById('btn-next').disabled = this.index >= total - 1;

    // Score
    document.getElementById('nb-su').textContent = this.scores.su;
    document.getElementById('nb-re').textContent = this.scores.re;
  },

  retourner() {
    this.retournee = !this.retournee;
    const carte = document.getElementById('carte');
    carte.classList.toggle('retournee', this.retournee);
    if (this.retournee) {
      document.getElementById('eval-zone').classList.add('visible');
    } else {
      document.getElementById('eval-zone').classList.remove('visible');
    }
  },

  evaluer(su) {
    if (su) this.scores.su++;
    else this.scores.re++;
    this.resultats[this.index] = su;
    document.getElementById('nb-su').textContent = this.scores.su;
    document.getElementById('nb-re').textContent = this.scores.re;
    // Avancer auto si pas dernière
    if (this.index < this.questions.length - 1) {
      setTimeout(() => this.suivante(), 350);
    } else {
      setTimeout(() => this.afficherFin(), 400);
    }
  },

  suivante() {
    if (this.index < this.questions.length - 1) {
      this.index++;
      this.afficher();
    }
  },

  precedente() {
    if (this.index > 0) {
      this.index--;
      this.afficher();
    }
  },

  melanger() {
    this.questions = this.shuffleArray(this.questions);
    this.index = 0;
    this.scores = { su: 0, re: 0 };
    this.resultats = [];
    this.afficher();
  },

  afficherFin() {
    document.getElementById('carte-zone').style.display = 'none';
    document.getElementById('eval-zone').classList.remove('visible');
    document.querySelector('.controls').style.display = 'none';
    document.querySelector('.shuffle-bar').style.display = 'none';
    const total = this.questions.length;
    const pct = Math.round(this.scores.su / total * 100);
    document.getElementById('fin-score').textContent = this.scores.su + ' / ' + total;
    let msg = '';
    if (pct >= 80) msg = '🎉 Excellent ! Tu maîtrises ce chapitre.';
    else if (pct >= 60) msg = '👍 Bon travail ! Revois les cartes ratées.';
    else msg = '📚 Continue ! Relis le cours et recommence.';
    document.getElementById('fin-msg').textContent = msg;
    document.getElementById('zone-fin').classList.add('visible');
  },

  recommencer() {
    this.questions = [...this.toutes];
    this.index = 0;
    this.scores = { su: 0, re: 0 };
    this.resultats = [];
    document.getElementById('carte-zone').style.display = 'flex';
    document.querySelector('.controls').style.display = 'flex';
    document.querySelector('.shuffle-bar').style.display = 'flex';
    document.getElementById('zone-fin').classList.remove('visible');
    this.afficher();
  },

  reviserRatees() {
    const ratees = this.questions.filter((q, i) => this.resultats[i] === false);
    if (!ratees.length) { alert('Aucune carte ratée ! 🎉'); return; }
    this.questions = ratees;
    this.index = 0;
    this.scores = { su: 0, re: 0 };
    this.resultats = [];
    document.getElementById('carte-zone').style.display = 'flex';
    document.querySelector('.controls').style.display = 'flex';
    document.querySelector('.shuffle-bar').style.display = 'flex';
    document.getElementById('zone-fin').classList.remove('visible');
    this.afficher();
  }
};

document.addEventListener('DOMContentLoaded', () => FC.init());
</script>
</body>
</html>
