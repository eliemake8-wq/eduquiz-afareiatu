<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Exercices — EduQuiz Afareiatu</title>
<link rel="stylesheet" href="css/polynesian.css"/>
<style>
/* === PAGE EXERCICES === */

body {
  background: linear-gradient(180deg, #e8f6fb 0%, #caf0f8 40%, #f0f8ff 100%);
  min-height: 100vh;
}

/* --- HERO CHAPITRE --- */
.hero {
  background: var(--grad-ocean);
  color: white;
  padding: 36px 24px 60px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 50%, rgba(72,202,228,.3) 0%, transparent 50%),
    radial-gradient(circle at 80% 30%, rgba(144,224,239,.2) 0%, transparent 40%);
}
.hero-emoji { font-size: 3.5rem; display: block; margin-bottom: 10px; filter: drop-shadow(0 4px 8px rgba(0,0,0,.2)); position: relative; z-index:1; }
.hero h1   { font-size: 1.7rem; font-weight: 900; margin-bottom: 6px; position: relative; z-index:1; }
.hero p    { font-size: .9rem; opacity: .85; margin-bottom: 20px; position: relative; z-index:1; }
.hero-tags { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; position: relative; z-index:1; }
.hero-tag  {
  background: rgba(255,255,255,.2);
  border: 1.5px solid rgba(255,255,255,.45);
  color: white;
  border-radius: 20px;
  padding: 4px 16px;
  font-size: .78rem;
  font-weight: 700;
  backdrop-filter: blur(4px);
}

/* Vague de séparation hero → contenu */
.hero-wave {
  display: block;
  margin-top: -2px;
  width: 100%;
  overflow: hidden;
  line-height: 0;
}
.hero-wave svg { display: block; }

/* --- SCORE HEADER --- */
.score-bar {
  background: white;
  border-radius: 20px;
  padding: 18px 24px;
  box-shadow: var(--ombre);
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.score-big {
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--lagon-dark);
  line-height: 1;
}
.score-info { flex: 1; min-width: 140px; }
.score-label { font-size: .72rem; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.score-mention {
  font-size: .85rem;
  font-weight: 800;
  padding: 3px 14px;
  border-radius: 20px;
  margin-top: 6px;
  display: inline-block;
}

/* --- CARTE EXERCICE --- */
.exo-card {
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 0;
  box-shadow: var(--ombre-card);
  margin-bottom: 20px;
  overflow: hidden;
  transition: .25s;
  border: 2px solid transparent;
}
.exo-card.correct  { border-color: #2ecc71; }
.exo-card.wrong    { border-color: #e74c3c; }
.exo-card.partial  { border-color: #f39c12; }

.exo-card:hover { box-shadow: var(--ombre-forte); }

.exo-card-header {
  background: linear-gradient(135deg, #f8fbff, #e8f4fd);
  padding: 18px 22px 14px;
  border-bottom: 1px solid #e0eef8;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.exo-num {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--grad-ocean);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: .9rem;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,119,182,.3);
}
.exo-question { font-size: .95rem; font-weight: 700; color: var(--texte); line-height: 1.5; flex: 1; }
.exo-context {
  font-size: .82rem;
  color: #6b7c93;
  margin-top: 4px;
  font-style: italic;
  display: flex;
  align-items: center;
  gap: 6px;
}

.exo-card-body { padding: 18px 22px; }

/* Type : numérique */
.input-num-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.input-num {
  flex: 1;
  min-width: 100px;
  max-width: 200px;
  padding: 10px 14px;
  border: 2px solid #d0e8f5;
  border-radius: 12px;
  font-family: inherit;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--texte);
  text-align: center;
  transition: .2s;
  background: white;
}
.input-num:focus { border-color: var(--lagon); outline: none; box-shadow: 0 0 0 4px rgba(0,201,224,.12); }
.input-unit {
  font-size: .9rem;
  color: #888;
  font-weight: 700;
  padding: 10px 14px;
  background: #f0f8ff;
  border: 2px solid #d0e8f5;
  border-radius: 12px;
  white-space: nowrap;
}

/* Type : texte */
.input-text {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #d0e8f5;
  border-radius: 12px;
  font-family: inherit;
  font-size: .92rem;
  color: var(--texte);
  resize: vertical;
  min-height: 80px;
  transition: .2s;
  background: white;
  line-height: 1.5;
}
.input-text:focus { border-color: var(--lagon); outline: none; box-shadow: 0 0 0 4px rgba(0,201,224,.12); }

/* Type : QCM */
.qcm-options { display: grid; gap: 8px; }
.qcm-opt {
  padding: 12px 16px;
  border: 2px solid #e0eef8;
  border-radius: 12px;
  cursor: pointer;
  transition: .2s;
  font-size: .9rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
  background: white;
}
.qcm-opt:hover { border-color: var(--lagon); background: var(--lagon-cl); }
.qcm-opt.selected { border-color: var(--lagon-dark); background: #e0f4ff; }
.qcm-opt.correct-opt { border-color: #2ecc71; background: #e6f4ea; color: #1a7a3c; }
.qcm-opt.wrong-opt   { border-color: #e74c3c; background: #fce8e6; color: #c0392b; }
.qcm-opt-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #e0eef8;
  color: var(--lagon-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: .78rem; font-weight: 900;
  flex-shrink: 0;
  transition: .2s;
}
.qcm-opt.selected .qcm-opt-letter { background: var(--lagon-dark); color: white; }

/* Points de l'exercice */
.exo-pts {
  font-size: .75rem;
  color: #aaa;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

/* Feedback */
.feedback {
  margin-top: 14px;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: .88rem;
  font-weight: 700;
  display: none;
  align-items: flex-start;
  gap: 10px;
  animation: fadeInUp .3s ease both;
}
.feedback.visible { display: flex; }
.feedback-icon { font-size: 1.3rem; flex-shrink: 0; }
.feedback-text { flex: 1; line-height: 1.5; }
.feedback-text .expl { font-weight: 600; color: inherit; opacity: .85; font-size: .83rem; margin-top: 4px; }

.feedback.ok  { background: #e6f4ea; color: #1a7a3c; border-left: 4px solid #2ecc71; }
.feedback.nok { background: #fce8e6; color: #c0392b; border-left: 4px solid #e74c3c; }
.feedback.mid { background: #fff3e0; color: #d07800; border-left: 4px solid #f39c12; }

/* Bouton valider */
.btn-valider {
  background: var(--grad-lagon);
  border: none;
  color: white;
  font-family: inherit;
  font-weight: 800;
  font-size: .9rem;
  padding: 10px 24px;
  border-radius: 12px;
  cursor: pointer;
  transition: .2s;
  box-shadow: 0 3px 12px rgba(0,180,216,.3);
  margin-top: 14px;
}
.btn-valider:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,180,216,.4); }
.btn-valider:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* --- BARRE DE NAVIGATION --- */
.nav-exo {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 32px;
}
.nav-exo a {
  padding: 10px 22px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 800;
  font-size: .88rem;
  transition: .2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-btn-cours  { background: var(--grad-ocean); color: white; box-shadow: 0 3px 12px rgba(2,62,138,.2); }
.nav-btn-qcm    { background: var(--grad-lagon);  color: white; box-shadow: 0 3px 12px rgba(0,180,216,.2); }
.nav-btn-fiche  { background: var(--grad-palme);  color: white; box-shadow: 0 3px 12px rgba(45,106,79,.2); }
.nav-exo a:hover { transform: translateY(-3px); filter: brightness(1.05); }

/* --- RÉCAP FINAL --- */
.recap-card {
  background: linear-gradient(135deg, rgba(255,255,255,.95), rgba(240,248,255,.9));
  backdrop-filter: blur(16px);
  border-radius: 24px;
  padding: 32px;
  text-align: center;
  box-shadow: var(--ombre-forte);
  margin-top: 32px;
  display: none;
  animation: pop .5s cubic-bezier(.4,0,.2,1) both;
}
.recap-card.visible { display: block; }
.recap-emoji { font-size: 4rem; display: block; margin-bottom: 12px; }
.recap-note {
  font-size: 3rem;
  font-weight: 900;
  background: var(--grad-ocean);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 8px;
}
.recap-mention { font-size: 1.1rem; font-weight: 800; margin-bottom: 16px; }
.recap-detail { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 16px; }
.recap-stat { text-align: center; padding: 12px 20px; background: white; border-radius: 14px; box-shadow: var(--ombre-card); }
.recap-stat .n { font-size: 1.6rem; font-weight: 900; color: var(--lagon-dark); }
.recap-stat .l { font-size: .72rem; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-top: 2px; }

/* Bouton recommencer */
.btn-recommencer {
  background: var(--grad-sunset);
  border: none;
  color: white;
  font-family: inherit;
  font-weight: 800;
  font-size: 1rem;
  padding: 14px 32px;
  border-radius: 16px;
  cursor: pointer;
  transition: .2s;
  box-shadow: 0 4px 16px rgba(249,199,79,.4);
  margin-top: 20px;
}
.btn-recommencer:hover { transform: translateY(-3px); box-shadow: 0 7px 25px rgba(249,199,79,.5); }

/* Icône décorative flottante */
.deco-float {
  position: fixed;
  pointer-events: none;
  opacity: .06;
  font-size: 8rem;
  z-index: 0;
  animation: floatDrift 20s ease-in-out infinite;
}
.deco-tl { top: 80px;  left:  -20px; animation-delay: 0s; }
.deco-tr { top: 120px; right: -20px; animation-delay: -7s; }
.deco-bl { bottom: 160px; left: -10px; animation-delay: -12s; }

@keyframes floatDrift {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-30px) rotate(5deg); }
}
</style>
</head>
<body>

<!-- Vagues de fond -->
<div class="wave"></div>
<div class="wave2"></div>

<!-- Décos flottantes -->
<div class="deco-float deco-tl">🌴</div>
<div class="deco-float deco-tr">🐠</div>
<div class="deco-float deco-bl">🐚</div>

<!-- ===== HEADER ===== -->
<header class="poly-header">
  <a href="../index.html" class="poly-logo">
    <span class="poly-logo-icon">🌺</span>
    <div>
      <h1>EduQuiz Afareiatu</h1>
      <p>Collège de Afareiatu · Moorea</p>
    </div>
  </a>
  <button class="poly-badge" onclick="window.history.back()">← Retour</button>
</header>
<div class="tapa-border"></div>

<!-- ===== HERO ===== -->
<div class="hero">
  <span class="hero-emoji" id="hero-emoji">⚗️</span>
  <h1 id="hero-titre">Mélanges et Corps Purs</h1>
  <p id="hero-sous">Chapitre 8 — 5ème · Physique-Chimie</p>
  <div class="hero-tags">
    <span class="hero-tag">🎯 <span id="hero-pts-total">20 points</span></span>
    <span class="hero-tag">📝 <span id="hero-nb-exo">6 exercices</span></span>
    <span class="hero-tag">⏱️ ~15 min</span>
  </div>
</div>
<div class="hero-wave">
  <svg viewBox="0 0 1440 48" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" height="48">
    <path fill="#e8f6fb" d="M0,32L60,26C120,21,240,10,360,10C480,10,600,21,720,26C840,32,960,37,1080,35C1200,32,1320,21,1380,16L1440,10L1440,48L0,48Z"/>
  </svg>
</div>

<!-- ===== CONTENU PRINCIPAL ===== -->
<div class="poly-main">

  <!-- Score en temps réel -->
  <div class="score-bar anim-fadeup">
    <div>
      <div class="score-label">Score actuel</div>
      <div class="score-big"><span id="score-pts">0</span> <span style="font-size:1rem;color:#aaa">/ <span id="score-total">20</span></span></div>
    </div>
    <div class="score-info">
      <div class="poly-progress">
        <div class="poly-progress-fill" id="score-bar" style="width:0%"></div>
      </div>
      <div class="mt-8 flex-between">
        <span class="score-mention" id="score-mention" style="background:#f0f8ff;color:#888">–</span>
        <span style="font-size:.8rem;color:#aaa"><span id="nb-repondus">0</span> / <span id="nb-total-exo">6</span> répondus</span>
      </div>
    </div>
  </div>

  <!-- ===== EXERCICES ===== -->
  <div id="exercices-container"></div>

  <!-- ===== RÉCAP FINAL ===== -->
  <div class="recap-card" id="recap">
    <span class="recap-emoji" id="recap-emoji">🌟</span>
    <div class="recap-note" id="recap-note">–/20</div>
    <div class="recap-mention" id="recap-mention">–</div>
    <div class="recap-detail">
      <div class="recap-stat">
        <div class="n" id="recap-ok">0</div>
        <div class="l">✅ Corrects</div>
      </div>
      <div class="recap-stat">
        <div class="n" id="recap-part">0</div>
        <div class="l">🟡 Partiels</div>
      </div>
      <div class="recap-stat">
        <div class="n" id="recap-nok">0</div>
        <div class="l">❌ À revoir</div>
      </div>
    </div>
    <button class="btn-recommencer" onclick="recommencer()">🔄 Recommencer</button>
  </div>

  <!-- Navigation -->
  <div class="nav-exo">
    <a href="cours.html"  class="nav-btn-cours">📖 Cours</a>
    <a href="qcm.html"   class="nav-btn-qcm" >❓ QCM</a>
    <a href="fiche.html" class="nav-btn-fiche">📋 Fiche</a>
  </div>

</div>

<script>
/* ============================================================
   CONFIGURATION — modifier ici pour chaque chapitre
   ============================================================ */
const CONFIG = {
  emoji: '⚗️',
  titre: 'Mélanges et Corps Purs',
  sous:  'Chapitre 8 — 5ème · Physique-Chimie',
  contexte: 'Dans les eaux du lagon de Moorea…',
  exercices: [
    {
      id: 1,
      type: 'numerique',     // 'numerique' | 'texte' | 'qcm'
      pts: 4,
      question: "L'eau de mer contient 35 g de sel pour 1 000 g d'eau de mer. Quelle est sa concentration massique en sel (en g/L) si la masse volumique de l'eau de mer est 1 025 g/L ?",
      contexte: '🌊 Lagon de Moorea — analyse d\'eau de mer',
      unite: 'g/L',
      reponse: 35.9,       // valeur numérique attendue
      tolerance: 5,        // ± en %
      explication: 'C = (35/1000) × 1025 ≈ 35,9 g/L. La concentration massique est le rapport masse de soluté / volume de solution.'
    },
    {
      id: 2,
      type: 'qcm',
      pts: 2,
      question: "L'eau de mer est-elle un corps pur ou un mélange ?",
      contexte: '🐠 Question de base — définitions',
      options: ['Un corps pur simple', 'Un corps pur composé', 'Un mélange homogène', 'Un mélange hétérogène'],
      reponse: 2,   // index 0-based
      explication: "L'eau de mer est un mélange homogène : on ne distingue pas ses constituants à l'œil nu. Elle contient de l'eau (solvant), du sel et d'autres minéraux (solutés)."
    },
    {
      id: 3,
      type: 'qcm',
      pts: 2,
      question: "Laquelle de ces techniques permet de séparer le sel de l'eau de mer ?",
      contexte: '🧪 Techniques de séparation',
      options: ['La filtration', 'La décantation', 'L\'évaporation', 'La centrifugation'],
      reponse: 2,
      explication: "L'évaporation (ou distillation) permet d'obtenir le sel : on chauffe l'eau de mer, l'eau s'évapore et le sel reste. Les marais salants utilisent ce principe avec l'énergie solaire."
    },
    {
      id: 4,
      type: 'numerique',
      pts: 3,
      question: "On dissout 12 g de sucre dans 240 mL d'eau. Quelle est la concentration massique en sucre (en g/L) ?",
      contexte: '🥤 Eau sucrée — recette polynésienne',
      unite: 'g/L',
      reponse: 50,
      tolerance: 5,
      explication: 'C = m/V = 12 g / 0,240 L = 50 g/L. Attention à convertir mL en L !'
    },
    {
      id: 5,
      type: 'texte',
      pts: 4,
      question: "Explique la différence entre un mélange homogène et un mélange hétérogène. Donne un exemple de chaque tiré de la vie en Polynésie.",
      contexte: '🌺 Exemples polynésiens',
      motsCles: ['homogène', 'hétérogène', 'distincts', 'œil', 'exemple'],
      nbMotsClesMin: 2,
      explication: "Mélange homogène : constituants non visibles à l'œil nu (ex : eau salée, jus de fruit). Mélange hétérogène : constituants visibles (ex : eau + sable du lagon, salade de fruits)."
    },
    {
      id: 6,
      type: 'numerique',
      pts: 5,
      question: "Une bouteille de 500 mL d'eau minérale contient 45 mg de calcium. Quelle est la concentration en calcium en mg/L ?",
      contexte: '💧 Eau minérale de Polynésie',
      unite: 'mg/L',
      reponse: 90,
      tolerance: 2,
      explication: 'C = 45 mg / 0,5 L = 90 mg/L. On divise la masse par le volume (en litres).'
    }
  ]
};

/* ============================================================
   ÉTAT
   ============================================================ */
let etat = {};   // id → { repondu, pts, ok }

/* ============================================================
   INITIALISATION
   ============================================================ */
function init() {
  // Mise à jour config hero
  document.getElementById('hero-emoji').textContent   = CONFIG.emoji;
  document.getElementById('hero-titre').textContent   = CONFIG.titre;
  document.getElementById('hero-sous').textContent    = CONFIG.sous;
  const totalPts = CONFIG.exercices.reduce((s,e)=>s+e.pts,0);
  document.getElementById('hero-pts-total').textContent = totalPts + ' points';
  document.getElementById('hero-nb-exo').textContent  = CONFIG.exercices.length + ' exercices';
  document.getElementById('score-total').textContent  = totalPts;
  document.getElementById('nb-total-exo').textContent = CONFIG.exercices.length;

  // Init état
  CONFIG.exercices.forEach(e=>{ etat[e.id]={ repondu:false, pts:0, ok:'nok' }; });

  // Rendu
  const container = document.getElementById('exercices-container');
  container.innerHTML = '';
  CONFIG.exercices.forEach((ex,i)=>{
    container.appendChild(renderExo(ex, i+1));
  });
}

/* ============================================================
   RENDU D'UN EXERCICE
   ============================================================ */
function renderExo(ex, num) {
  const card = document.createElement('div');
  card.className = `exo-card anim-fadeup delay-${Math.min(num,5)}`;
  card.id = `card-${ex.id}`;

  let inputHTML = '';
  if (ex.type === 'numerique') {
    inputHTML = `
      <div class="input-num-wrap">
        <input type="number" class="input-num" id="inp-${ex.id}" placeholder="?" step="any"
               onkeydown="if(event.key==='Enter') valider(${ex.id})"/>
        <span class="input-unit">${ex.unite}</span>
      </div>`;
  } else if (ex.type === 'texte') {
    inputHTML = `<textarea class="input-text" id="inp-${ex.id}" placeholder="Ta réponse ici… (en français, avec tes propres mots)"></textarea>`;
  } else if (ex.type === 'qcm') {
    inputHTML = `<div class="qcm-options" id="opts-${ex.id}">` +
      ex.options.map((o,i)=>`
        <div class="qcm-opt" id="opt-${ex.id}-${i}" onclick="selectOpt(${ex.id},${i})">
          <span class="qcm-opt-letter">${'ABCD'[i]}</span>
          <span>${o}</span>
        </div>`).join('') +
    `</div>`;
  }

  card.innerHTML = `
    <div class="exo-card-header">
      <div class="exo-num">${num}</div>
      <div style="flex:1">
        <div class="exo-question">${ex.question}</div>
        <div class="exo-context">${ex.contexte||''}</div>
      </div>
      <div class="exo-pts">⭐ ${ex.pts} pt${ex.pts>1?'s':''}</div>
    </div>
    <div class="exo-card-body">
      ${inputHTML}
      <div class="feedback" id="fb-${ex.id}">
        <span class="feedback-icon" id="fb-icon-${ex.id}"></span>
        <div class="feedback-text">
          <span id="fb-msg-${ex.id}"></span>
          <div class="expl" id="fb-expl-${ex.id}"></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn-valider" id="btn-${ex.id}" onclick="valider(${ex.id})">
          Vérifier ✓
        </button>
        <span id="pts-earned-${ex.id}" style="font-size:.82rem;font-weight:800;display:none"></span>
      </div>
    </div>`;
  return card;
}

/* ============================================================
   SÉLECTION QCM
   ============================================================ */
let selectedOpts = {};
function selectOpt(exoId, idx) {
  if (etat[exoId].repondu) return;
  selectedOpts[exoId] = idx;
  document.querySelectorAll(`#opts-${exoId} .qcm-opt`).forEach((o,i)=>{
    o.classList.toggle('selected', i===idx);
  });
}

/* ============================================================
   VALIDATION
   ============================================================ */
function valider(exoId) {
  if (etat[exoId].repondu) return;
  const ex  = CONFIG.exercices.find(e=>e.id===exoId);
  const fb  = document.getElementById(`fb-${exoId}`);
  const btn = document.getElementById(`btn-${exoId}`);
  const card = document.getElementById(`card-${exoId}`);
  let ptsCagnotte = 0, ok = 'nok', msg = '', icon = '';

  if (ex.type === 'numerique') {
    const val = parseFloat(document.getElementById(`inp-${exoId}`).value);
    if (isNaN(val)) { showToast('⚠️ Entre une valeur numérique !'); return; }
    const ecart = Math.abs((val - ex.reponse) / ex.reponse * 100);
    if (ecart <= ex.tolerance) {
      ptsCagnotte = ex.pts; ok = 'ok';
      icon = '✅'; msg = `Bonne réponse ! ${ex.reponse} ${ex.unite}`;
    } else if (ecart <= ex.tolerance * 3) {
      ptsCagnotte = Math.round(ex.pts * 0.5); ok = 'mid';
      icon = '🟡'; msg = `Presque ! La bonne réponse est ${ex.reponse} ${ex.unite} (tu avais ${val})`;
    } else {
      ok = 'nok';
      icon = '❌'; msg = `Incorrect. La réponse est ${ex.reponse} ${ex.unite}`;
    }

  } else if (ex.type === 'qcm') {
    if (selectedOpts[exoId] === undefined) { showToast('⚠️ Choisis une option !'); return; }
    const choix = selectedOpts[exoId];
    // Colorer les options
    ex.options.forEach((_,i)=>{
      const optEl = document.getElementById(`opt-${exoId}-${i}`);
      if (i === ex.reponse) optEl.classList.add('correct-opt');
      else if (i === choix && i !== ex.reponse) optEl.classList.add('wrong-opt');
    });
    if (choix === ex.reponse) {
      ptsCagnotte = ex.pts; ok = 'ok';
      icon = '✅'; msg = `Bonne réponse ! Réponse : ${ex.options[ex.reponse]}`;
    } else {
      ok = 'nok';
      icon = '❌'; msg = `Incorrect. La bonne réponse était : ${ex.options[ex.reponse]}`;
    }

  } else if (ex.type === 'texte') {
    const rep = document.getElementById(`inp-${exoId}`).value.toLowerCase().trim();
    if (rep.length < 10) { showToast('⚠️ Ta réponse est trop courte !'); return; }
    const found = ex.motsCles.filter(m => rep.includes(m.toLowerCase()));
    const ratio = found.length / ex.motsCles.length;
    if (ratio >= 0.8) {
      ptsCagnotte = ex.pts; ok = 'ok';
      icon = '✅'; msg = `Excellente réponse ! Mots-clés trouvés : ${found.join(', ')}`;
    } else if (ratio >= 0.4) {
      ptsCagnotte = Math.round(ex.pts * ratio); ok = 'mid';
      icon = '🟡'; msg = `Réponse partielle. Mots-clés : ${found.join(', ')} (${found.length}/${ex.motsCles.length})`;
    } else {
      ptsCagnotte = 0; ok = 'nok';
      icon = '❌'; msg = `Réponse incomplète. Mots attendus : ${ex.motsCles.join(', ')}`;
    }
  }

  // Mise à jour état
  etat[exoId] = { repondu: true, pts: ptsCagnotte, ok };

  // Afficher feedback
  fb.className = `feedback visible ${ok === 'ok' ? 'ok' : ok === 'mid' ? 'mid' : 'nok'}`;
  document.getElementById(`fb-icon-${exoId}`).textContent = icon;
  document.getElementById(`fb-msg-${exoId}`).textContent  = msg;
  document.getElementById(`fb-expl-${exoId}`).textContent = ex.explication || '';

  // Pts gagnés
  const ptsEl = document.getElementById(`pts-earned-${exoId}`);
  ptsEl.style.display = 'inline';
  ptsEl.textContent = `+${ptsCagnotte} pt${ptsCagnotte>1?'s':''}`;
  ptsEl.style.color = ok==='ok' ? '#27ae60' : ok==='mid' ? '#e67e22' : '#e74c3c';

  // Border card
  card.classList.add(ok==='ok' ? 'correct' : ok==='mid' ? 'partial' : 'wrong');

  // Désactiver bouton
  btn.disabled = true;
  btn.textContent = '✓ Répondu';

  // Maj score
  majScore();
}

/* ============================================================
   MISE À JOUR DU SCORE
   ============================================================ */
function majScore() {
  const totalPts = CONFIG.exercices.reduce((s,e)=>s+e.pts,0);
  const pts    = Object.values(etat).reduce((s,e)=>s+e.pts,0);
  const nbRep  = Object.values(etat).filter(e=>e.repondu).length;
  const pct    = (pts/totalPts)*100;
  const note20 = Math.round(pts/totalPts*20*10)/10;

  document.getElementById('score-pts').textContent     = pts;
  document.getElementById('nb-repondus').textContent   = nbRep;
  document.getElementById('score-bar').style.width     = pct + '%';

  // Mention
  const mentionEl = document.getElementById('score-mention');
  let mention = '', col = '';
  if (pct < 40)      { mention='🔴 À revoir';   col='#fce8e6;color:#c0392b'; }
  else if (pct < 65) { mention='🟡 Passable';    col='#fff3e0;color:#d07800'; }
  else if (pct < 80) { mention='🟢 Bien';         col='#e6f4ea;color:#27ae60'; }
  else               { mention='💚 Excellent !';  col='#d8f3dc;color:#1b4332'; }
  mentionEl.textContent = mention;
  mentionEl.style.cssText = `background:#${col};padding:3px 14px;border-radius:20px;font-size:.82rem;font-weight:800;margin-top:6px;display:inline-block;`;

  // Récap si tout répondu
  if (nbRep === CONFIG.exercices.length) afficherRecap(pts, totalPts, note20, pct);
}

/* ============================================================
   RÉCAP FINAL
   ============================================================ */
function afficherRecap(pts, totalPts, note20, pct) {
  const recap = document.getElementById('recap');
  recap.classList.add('visible');

  let emoji = '😐', mention = '';
  if      (pct >= 90) { emoji = '🏆'; mention = 'Excellent ! Bravo !'; }
  else if (pct >= 75) { emoji = '🌟'; mention = 'Très bien !'; }
  else if (pct >= 60) { emoji = '👍'; mention = 'Bien !'; }
  else if (pct >= 40) { emoji = '📖'; mention = 'À retravailler'; }
  else                { emoji = '🔄'; mention = 'À revoir avec le cours'; }

  document.getElementById('recap-emoji').textContent   = emoji;
  document.getElementById('recap-note').textContent    = `${note20}/20`;
  document.getElementById('recap-mention').textContent = mention;

  const okN   = Object.values(etat).filter(e=>e.ok==='ok').length;
  const midN  = Object.values(etat).filter(e=>e.ok==='mid').length;
  const nokN  = Object.values(etat).filter(e=>e.ok==='nok').length;
  document.getElementById('recap-ok').textContent   = okN;
  document.getElementById('recap-part').textContent = midN;
  document.getElementById('recap-nok').textContent  = nokN;

  recap.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

/* ============================================================
   RECOMMENCER
   ============================================================ */
function recommencer() {
  selectedOpts = {};
  document.getElementById('recap').classList.remove('visible');
  init();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ============================================================
   TOAST
   ============================================================ */
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:white;padding:10px 22px;border-radius:20px;font-weight:700;font-size:.88rem;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:.3s;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(()=>{ t.style.opacity = '0'; }, 2200);
}

/* ============================================================
   LANCEMENT
   ============================================================ */
init();
</script>
